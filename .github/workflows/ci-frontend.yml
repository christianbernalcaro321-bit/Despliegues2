name: CI Frontend Docker
on:
  push:
    branches:
      - main
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_test
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Construir imagen Docker
        run: docker build -t chriscaro/frontend-html:latest .
      - name: Publicar imagen en Docker Hub
        run: docker push chriscaro/frontend-html:latest
  deploy-frontend:
    runs-on: self-hosted
    needs: build-frontend
    steps:
      - name: Actualizar contenedor frontend
        run: |
          cd /Users/christianbernal/Downloads/proyecto_docker_compose_limpio
          docker compose pull frontend
          docker compose up -d frontend
